name: quant-watchdog

# Independent end-of-day check: did today's book + practice mark actually land?
# Runs AFTER all three pipeline attempts. Reads committed state only — no API
# calls, no cost. Goes red + notifies (Telegram if configured; GitHub also
# emails the repo owner on scheduled-workflow failures) when a day is broken.
on:
  schedule:
    - cron: "19 15 * * 1-5"    # 15:19 UTC ≈ 20:49 IST, weekdays
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # stdlib only — no pip install, nothing to pay, nothing to break
      - name: Did today happen?
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 watchdog.py
